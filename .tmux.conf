# tmux config — Claude Code + mosh (iPad Blink Shell client) 用途中心
# Reload: `tmux source-file ~/.tmux.conf` or prefix + r

# ─── Terminal capabilities ──────────────────────────────────────
set -g default-terminal "tmux-256color"
# RGB (TrueColor) の設定を Ghostty と xterm 全般に適用
set -ga terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB"
set -g allow-passthrough on
set -as terminal-features ",xterm-ghostty:images:RGB"

# フォーカスイベントを確実に透過させる設定
set -as terminal-overrides ',*:extkeys'
# フォーカス通知 (OSC 1004) を有効化するための標準的な overrides
set -as terminal-overrides ',*:kfante=\E[?1004h' 

# Mouse + clipboard
set -g mouse on
set -s set-clipboard on

# History buffer (Claude Code の長い tool 出力を遡るため大きめ)
set -g history-limit 100000

# Reduce escape time (vim / repaint で体感差大、mosh 越しでも有効)
set -s escape-time 10

# ─── Prefix ─────────────────────────────────────────────────────
# C-b 既定のまま (慣れ重視)。Blink/iPad の Ctrl と相性も良い
unbind C-b
set -g prefix C-q
bind C-q send-prefix

# ─── Window / pane behavior ─────────────────────────────────────
# Window/pane index を 1 origin に (0 はホームポジションから遠い)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Pane 移動: vim 流 hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane split: 直感的キー (現 dir 継承)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# ─── Status bar (簡素・実用) ───────────────────────────────────
set -g status-interval 5
set -g status-position top
set -g status-style "fg=colour250,bg=#040032"
set -g status-left "#[fg=colour39,bold] #S #[default]| "
set -g status-left-length 30
set -g status-right "#[fg=colour244]%Y-%m-%d %H:%M "
set -g window-status-current-style "fg=colour39,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

# ─── Activity / bell ────────────────────────────────────────────
set -g monitor-activity on
set -g visual-activity off  # mosh 越しで bell 嵐を避ける

# ─── Mosh / iPad 配慮 ────────────────────────────────────────────
# mosh は predictive echo + 自動再描画なので focus events / aggressive
# resize は不要。default で OK。

# --- misc
set -g focus-events on
set-hook -g after-select-pane "run-shell '/opt/homebrew/bin/im-select com.apple.keylayout.ABC'"
set-hook -g client-focus-in  "run-shell '/opt/homebrew/bin/im-select com.apple.keylayout.ABC'"

#
# アクティブなペインの境界線の色を明るい青にする
set -g pane-active-border-style fg=colour111,bg=default
set -g window-style 'bg=#020016'
set -g window-active-style 'bg=#040032'
